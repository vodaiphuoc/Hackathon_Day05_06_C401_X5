version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: vinhomes123
      POSTGRES_DB: vinhomes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:               # THÊM DÒNG NÀY
      - ./app:/app
    env_file:
      - .env
    depends_on:
      - db
      - qdrant

  fe:
    build: ./fe
    ports:
      - "5173:5173"
    volumes:
      - ./fe:/app
      - /app/node_modules
    depends_on:
      - app

volumes:
  postgres_data:
  qdrant_data: